<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="referrer" content="no-referrer" />
		<title>Pick a Drive folder — Snow Screenshot</title>
		<style>
			html,
			body {
				margin: 0;
				min-height: 100%;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				background: #15171c;
				color: #e7eaf0;
			}
			main {
				padding: 16px;
				max-width: 560px;
				margin: 0 auto;
			}
			h1 {
				margin: 0 0 6px;
				font-size: 16px;
			}
			p {
				margin: 4px 0;
				font-size: 13px;
				color: #a4adba;
			}
			#log {
				margin-top: 12px;
				padding: 10px 12px;
				background: #0d0f13;
				border: 1px solid #2a2e36;
				border-radius: 8px;
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
				font-size: 12px;
				white-space: pre-wrap;
				min-height: 80px;
			}
			.row {
				padding: 2px 0;
			}
			.ok {
				color: #54c689;
			}
			.err {
				color: #ff7a6e;
			}
			.warn {
				color: #f0bc55;
			}
			@media (prefers-color-scheme: light) {
				html,
				body {
					background: #f6f7f9;
					color: #1b1f24;
				}
				p {
					color: #5b6573;
				}
				#log {
					background: #fff;
					border-color: #e4e7eb;
				}
			}
		</style>
	</head>
	<body>
		<main>
			<h1>Pick a Drive folder</h1>
			<p>
				Select a folder for Snow Screenshot. The Google Picker will appear on top of
				this page.
			</p>
			<div id="log" aria-live="polite"></div>
		</main>

		<script>
			(function () {
				const logEl = document.getElementById('log');
				window.__pickerLog = function (text, kind) {
					const row = document.createElement('div');
					row.className = 'row' + (kind ? ' ' + kind : '');
					row.textContent =
						'[' + new Date().toISOString().slice(11, 19) + '] ' + text;
					logEl.appendChild(row);
				};
				window.__pickerLog('picker page loaded');
				window.addEventListener('error', (e) => {
					window.__pickerLog('JS error: ' + (e.message || e.error), 'err');
				});
				window.addEventListener('unhandledrejection', (e) => {
					window.__pickerLog(
						'Promise rejection: ' +
							(e.reason && e.reason.message ? e.reason.message : e.reason),
						'err'
					);
				});
			})();
		</script>
		<script
			src="https://apis.google.com/js/api.js"
			onload="window.__pickerLog && window.__pickerLog('apis.google.com/js/api.js loaded', 'ok')"
			onerror="window.__pickerLog && window.__pickerLog('Failed to load Google API script', 'err')"
		></script>
		<script src="picker.js"></script>
	</body>
</html>
