<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="referrer" content="no-referrer" />
		<meta name="color-scheme" content="light dark" />
		<title>Pick a Drive folder — Snow Screenshot</title>
		<style>
			:root {
				color-scheme: light dark;

				--brand-500: #ff6a00;
				--brand-600: #e65f00;

				--bg: #ffffff;
				--bg-muted: #f6f7f9;
				--bg-log: #ffffff;
				--border: #e4e7eb;

				--text: #1b1f24;
				--text-muted: #5b6573;

				--ok: #1f8a4c;
				--err: #c0392b;
				--warn: #c98300;

				--shadow-1: 0 1px 2px rgba(15, 23, 42, 0.06);
			}

			@media (prefers-color-scheme: dark) {
				:root {
					--bg: #15171c;
					--bg-muted: #1c1f26;
					--bg-log: #0d0f13;
					--border: #2a2e36;

					--text: #e7eaf0;
					--text-muted: #a4adba;

					--ok: #54c689;
					--err: #ff7a6e;
					--warn: #f0bc55;

					--shadow-1: 0 1px 2px rgba(0, 0, 0, 0.4);
				}
			}

			html,
			body {
				margin: 0;
				min-height: 100%;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				background: var(--bg);
				color: var(--text);
			}

			header {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 12px 16px;
				background: var(--bg-muted);
				border-bottom: 1px solid var(--border);
				box-shadow: var(--shadow-1);
			}

			.brand-mark {
				width: 18px;
				height: 18px;
				border-radius: 5px;
				background: linear-gradient(135deg, var(--brand-500), var(--brand-600));
				flex-shrink: 0;
			}

			header h1 {
				margin: 0;
				font-size: 15px;
				font-weight: 600;
			}

			main {
				padding: 16px;
				max-width: 560px;
				margin: 0 auto;
			}

			p {
				margin: 0 0 8px;
				font-size: 13px;
				color: var(--text-muted);
				line-height: 1.45;
			}

			#log {
				margin-top: 12px;
				padding: 10px 12px;
				background: var(--bg-log);
				border: 1px solid var(--border);
				border-radius: 8px;
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
				font-size: 12px;
				white-space: pre-wrap;
				min-height: 80px;
				color: var(--text);
			}

			.row {
				padding: 2px 0;
			}

			.ok {
				color: var(--ok);
			}

			.err {
				color: var(--err);
			}

			.warn {
				color: var(--warn);
			}
		</style>
	</head>
	<body>
		<header>
			<span class="brand-mark" aria-hidden="true"></span>
			<h1>Pick a Drive folder</h1>
		</header>

		<main>
			<p>
				Select a folder for Snow Screenshot. The Google Picker will appear on top of
				this page.
			</p>
			<div id="log" aria-live="polite"></div>
		</main>

		<script>
			(function () {
				const logEl = document.getElementById('log');
				window.__pickerLog = function (text, kind) {
					const row = document.createElement('div');
					row.className = 'row' + (kind ? ' ' + kind : '');
					row.textContent =
						'[' + new Date().toISOString().slice(11, 19) + '] ' + text;
					logEl.appendChild(row);
				};
				window.__pickerLog('picker page loaded');
				window.addEventListener('error', (e) => {
					window.__pickerLog('JS error: ' + (e.message || e.error), 'err');
				});
				window.addEventListener('unhandledrejection', (e) => {
					window.__pickerLog(
						'Promise rejection: ' +
							(e.reason && e.reason.message ? e.reason.message : e.reason),
						'err'
					);
				});
			})();
		</script>
		<script
			src="https://apis.google.com/js/api.js"
			onload="window.__pickerLog && window.__pickerLog('apis.google.com/js/api.js loaded', 'ok')"
			onerror="window.__pickerLog && window.__pickerLog('Failed to load Google API script', 'err')"
		></script>
		<script src="picker.js"></script>
	</body>
</html>
